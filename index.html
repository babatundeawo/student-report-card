<!doctype html>
<html lang="en">
  <head>
    <title>Student's Report App</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        background-color: #f4f4f9;
        text-align: center;
        padding: 20px;
      }
      h1 {
        color: #2c3e50;
      }
      .report-card {
        background-color: white;
        border: 2px solid #2c3e50;
        border-radius: 10px;
        padding: 15px;
        margin: 15px auto;
        width: 250px;
        box-shadow: 2px 2px 8px rgba(0, 0, 0, 0.1);
      }
      .report-card h2 {
        color: #e67e22;
      }
    </style>
  </head>
  <body>
    <h1>Babatunde's Student Report App</h1>
    <div id="reportContainer"></div>

    <script>
      const students = [
        {
          name: "Amara",
          scores: { maths: 88, english: 92, science: 85 },
        },
        {
          name: "Bob",
          scores: { maths: 72, english: 65, science: 80 },
        },
        {
          name: "Samson",
          scores: { maths: 95, english: 91, science: 97},
        },
      ];
      console.log(students);

      function processStudent(student) {
        const { name, scores: { maths, english, science } } = student;
        const average = Math.round((maths + english + science) / 3);
        return { name, maths, english, science, average };
      }
      
      const results = students.map(processStudent);
      const container = document.getElementById("reportContainer");
      for (const { name, maths, english, science, average } of results) {
        const card = document.createElement("div");
        card.className = "report-card";
        card.innerHTML = `
          <h2>${name}</h1>
          <p>Maths: ${maths}</p>
          <p>English: ${english}</p>
          <p>science: ${science}</p>
          <p><strong>Average: ${average}</strong></p>
        `;
        container.appendChild(card);
      }
    </script>
    <p>Made by Babatunde Awoyemi - Techbase Consultant Services</p>
  </body>
</html>
